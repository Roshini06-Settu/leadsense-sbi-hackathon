<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeadSense — Staff Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📊 LeadSense — Lead Dashboard</h1>
    <p>Ranked list of website visitors by likelihood to convert</p>
  </header>

  <main style="max-width: 900px;">
    <button onclick="loadLeads()">🔄 Refresh Leads</button>
    <table id="leadsTable">
      <thead>
        <tr>
          <th>Visitor ID</th>
          <th>Score</th>
          <th>Status</th>
          <th>Reason</th>
        </tr>
      </thead>
      <tbody id="leadsBody">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p><a href="index.html">← Back to Demo Bank Website</a></p>
  </footer>

  <script>
    const API_URL = "http://localhost:5000";

    function loadLeads() {
      fetch(API_URL + "/leads")
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById("leadsBody");
          tbody.innerHTML = "";

          // Show only the latest record per visitor
          const latestByVisitor = {};
          data.forEach(lead => {
            if (!latestByVisitor[lead.visitor_id] || lead.id > latestByVisitor[lead.visitor_id].id) {
              latestByVisitor[lead.visitor_id] = lead;
            }
          });

          const leads = Object.values(latestByVisitor).sort((a, b) => b.score - a.score);

          if (leads.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4'>No leads yet. Visit the demo site first.</td></tr>";
            return;
          }

          leads.forEach(lead => {
            const labelClass = lead.label.toLowerCase();
            const row = `<tr>
              <td>${lead.visitor_id}</td>
              <td>${lead.score}</td>
              <td class="${labelClass}">${lead.label === "Hot" ? "🔥" : lead.label === "Warm" ? "🟡" : "❄️"} ${lead.label}</td>
              <td>${lead.reason}</td>
            </tr>`;
            tbody.innerHTML += row;
          });
        })
        .catch(err => {
          document.getElementById("leadsBody").innerHTML =
            "<tr><td colspan='4'>Error loading leads. Is the backend running?</td></tr>";
          console.error(err);
        });
    }

    window.addEventListener("load", loadLeads);
    setInterval(loadLeads, 10000);
  </script>
</body>
</html>
